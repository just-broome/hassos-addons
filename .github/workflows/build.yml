name: Build and Push Grafana Alloy

on:
  push:
    branches:
      - main
    paths:
      - 'grafana_alloy/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'grafana_alloy/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract versions
        id: version
        run: |
          ALLOY_VERSION=$(grep 'GRAFANA_ALLOY_VERSION=' grafana_alloy/Dockerfile | sed 's/.*GRAFANA_ALLOY_VERSION="\(.*\)".*/\1/')
          ADDON_VERSION=$(grep '^version:' grafana_alloy/config.yaml | sed 's/version: *"\(.*\)"/\1/')
          echo "alloy_version=$ALLOY_VERSION" >> $GITHUB_OUTPUT
          echo "addon_version=$ADDON_VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./grafana_alloy
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/just-broome/hassos-addons/grafana_alloy:${{ steps.version.outputs.addon_version }}
            ghcr.io/just-broome/hassos-addons/grafana_alloy:${{ steps.version.outputs.alloy_version }}
            ghcr.io/just-broome/hassos-addons/grafana_alloy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_FROM=ghcr.io/hassio-addons/debian-base/aarch64:9.1.0
            BUILD_ARCH=aarch64
            BUILD_VERSION=${{ steps.version.outputs.addon_version }}
